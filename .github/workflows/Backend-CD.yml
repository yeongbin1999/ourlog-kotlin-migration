name: Backend CD

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "backend/**"
      - "infra/docker/**"

jobs:
  # 1. Git 태그 & 릴리즈 생성
  makeTagAndRelease:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.set_tag_output.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Tag
        id: create_tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Tag Output
        id: set_tag_output
        run: |
          echo "new_tag=${{ steps.create_tag.outputs.new_tag }}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.create_tag.outputs.new_tag }}
          release_name: Release ${{ steps.create_tag.outputs.new_tag }}
          body: ${{ steps.create_tag.outputs.changelog }}
          draft: false
          prerelease: false

  # 2. Docker 이미지 빌드 & 푸시
  buildImageAndPush:
    needs: makeTagAndRelease
    runs-on: ubuntu-latest
    env:
      DOT_ENV: ${{ secrets.DOT_ENV }}
      DOCKER_IMAGE_NAME: ourlog-backend
    steps:
      - uses: actions/checkout@v4

      - name: Generate .env
        run: echo "$DOT_ENV" > backend/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}:${{ needs.makeTagAndRelease.outputs.tag_name }}
            ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. EC2 배포 SSM (Blue-Green)
  deploy:
    needs: buildImageAndPush
    runs-on: ubuntu-latest
    env:
      DOT_ENV: ${{ secrets.DOT_ENV }}
      DOCKER_IMAGE_NAME: ourlog-backend
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Get EC2 Instance ID
        id: get_instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=terra-ec2-web" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          
          if [ -z "$INSTANCE_ID" ]; then
            echo "❌ No running EC2 instance found"
            exit 1
          fi

          echo "EC2 ID: $INSTANCE_ID"
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      - name: Deploy Container via SSM (Blue-Green)
        uses: peterkimzz/aws-ssm-send-command@master
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          instance-ids: ${{ env.INSTANCE_ID }}
          working-directory: /
          comment: Deploy
          command: |
            IMAGE=ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}:${{ needs.makeTagAndRelease.outputs.tag_name }}

            # .env 파일 생성
            mkdir -p /home/ubuntu/backend
            cat <<EOF > /home/ubuntu/backend/.env
            $DOT_ENV
            EOF

            # 현재 활성 컨테이너 확인
            if docker ps --filter "name=backend-blue" | grep backend-blue; then
                ACTIVE=blue
                INACTIVE=green
                PORT_ACTIVE=8081
                PORT_INACTIVE=8082
            else
                ACTIVE=green
                INACTIVE=blue
                PORT_ACTIVE=8082
                PORT_INACTIVE=8081
            fi

            # 새 컨테이너 실행 준비
            docker stop backend-$INACTIVE || true
            docker rm backend-$INACTIVE || true

            docker run -d --name backend-$INACTIVE \
              --network common \
              -p $PORT_INACTIVE:8080 \
              --env-file /home/ubuntu/backend/.env \
              $IMAGE

            # Health Check
            echo "⏱ Waiting for new container to become healthy..."
            for i in {1..30}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:$PORT_INACTIVE/actuator/health)
              if [ "$STATUS" -eq 200 ]; then
                echo "✅ New container is healthy!"
                break
              fi
              sleep 2
            done

            # Nginx Proxy Manager 업스트림 전환
            NPM_TOKEN=$(curl -s -X POST http://127.0.0.1:81/api/tokens \
              -H "Content-Type: application/json" \
              -d "{\"identity\": \"${{ secrets.NPM_ID }}\", \"secret\": \"${{ secrets.NPM_PASSWORD }}\"}" | jq -r '.token')
            
            PROXY_ID=$(curl -s -X GET "http://127.0.0.1:81/api/nginx/proxy-hosts" \
              -H "Authorization: Bearer $NPM_TOKEN" \
              | jq '.[] | select(.domain_names[]=="${{ secrets.NPM_DOMAIN }}") | .id')

            echo "🔎 Found Proxy Host ID: $PROXY_ID"

            curl -X PATCH "http://127.0.0.1:81/api/nginx/proxy-hosts/$PROXY_ID" \
              -H "Authorization: Bearer $NPM_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"forward_host\": \"127.0.0.1\", \"forward_port\": $PORT_INACTIVE}"

            # 이전 컨테이너 종료
            docker stop backend-$ACTIVE || true
            docker rm backend-$ACTIVE || true

            echo "✅ Deployment complete. Active container: $INACTIVE"
